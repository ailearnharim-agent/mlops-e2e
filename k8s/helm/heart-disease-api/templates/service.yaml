apiVersion: v1
kind: Service
metadata:
  name: {{ include "heart-disease-api.fullname" . }}-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "heart-disease-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "heart-disease-api.fullname" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
